name: Spring Boot CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  BUILD_VERSION: 1.0.0-${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile
        run: mvn clean compile -DskipTests

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Tests
        run: mvn test

      - name: Publish Test Report
        if: always() && github.event_name != 'pull_request'
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'demo/target/surefire-reports/TEST-*.xml'

  lint-test:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Verification (Lint/Checks)
        run: mvn verify -DskipTests

  package:
    runs-on: ubuntu-latest
    needs: [unit-test, lint-test]
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Package JAR
        run: |
          echo "BUILD_VERSION=$BUILD_VERSION"
          mvn package -DskipTests
          JAR=$(ls target/*SNAPSHOT.jar | head -n 1)
          mv "$JAR" target/app-${BUILD_VERSION}.jar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: demo/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: target/

      - name: Deploy Application
        run: echo "Deploying version ${{ env.BUILD_VERSION }}..."
